<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTI Cancellation Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:'Inter',sans-serif;font-size:13px;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#161b22;border-bottom:1px solid #30363d;position:sticky;top:0;z-index:200}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.5px}.logo span{color:#388bfd}
.badge{background:#388bfd22;color:#388bfd;border:1px solid #388bfd44;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.dot{width:7px;height:7px;border-radius:50%;background:#3fb950;display:inline-block;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.filters{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;padding:12px 20px;background:#161b22;border-bottom:1px solid #30363d}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:10px;color:#8b949e;font-weight:600;text-transform:uppercase;letter-spacing:.6px}
select,input[type=date]{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:0 10px;border-radius:6px;font-size:12px;font-family:Inter,sans-serif;cursor:pointer;outline:none;height:32px}
select:focus,input[type=date]:focus{border-color:#388bfd}
.sep{width:1px;height:32px;background:#30363d;flex-shrink:0}
.btn{padding:0 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #30363d;font-family:Inter,sans-serif;height:32px;transition:all .15s}
.btn-p{background:#238636;border-color:#238636;color:#fff}.btn-p:hover{background:#2ea043}
.btn-g{background:transparent;color:#8b949e}.btn-g:hover{background:#21262d;color:#e6edf3}
.ms-wrap{position:relative}
.ms-btn{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:0 28px 0 10px;border-radius:6px;font-size:12px;font-family:Inter,sans-serif;cursor:pointer;width:190px;text-align:left;position:relative;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;height:32px;display:flex;align-items:center}
.ms-btn::after{content:'▾';position:absolute;right:8px;color:#8b949e;font-size:10px}
.ms-drop{position:absolute;top:calc(100% + 4px);left:0;width:260px;background:#161b22;border:1px solid #30363d;border-radius:8px;z-index:300;max-height:300px;overflow-y:auto;box-shadow:0 8px 24px #000000aa;display:none}
.ms-drop.open{display:block}
.ms-sticky{position:sticky;top:0;background:#161b22;z-index:1;border-bottom:1px solid #30363d}
.ms-search{padding:8px}
.ms-search input{width:100%;background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:5px 8px;border-radius:5px;font-size:11px;font-family:Inter,sans-serif;outline:none}
.ms-actions{display:flex;gap:8px;padding:4px 10px 8px}
.ms-act{font-size:11px;color:#388bfd;cursor:pointer;background:none;border:none;font-family:Inter,sans-serif;padding:0}
.ms-act:hover{text-decoration:underline}
.ms-item{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;font-size:12px}
.ms-item:hover{background:#21262d}
.ms-item input{accent-color:#388bfd;cursor:pointer;width:13px;height:13px;flex-shrink:0;pointer-events:none}
.ms-cnt{background:#388bfd;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:600;margin-left:4px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:12px;color:#8b949e}
.spinner{width:32px;height:32px;border:2px solid #30363d;border-top-color:#388bfd;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.main{padding:14px 20px;display:flex;flex-direction:column;gap:14px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px}
.kpi{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px 14px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.k1::after{background:#388bfd}.kpi.k2::after{background:#58a6ff}.kpi.k3::after{background:#f85149}
.kpi.k4::after{background:#f85149}.kpi.k5::after{background:#e3b341}.kpi.k6::after{background:#3fb950}
.kpi.k7::after{background:#bc8cff}.kpi.k8::after{background:#39d353}
.kl{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.7px;font-weight:500;margin-bottom:5px}
.kv{font-size:24px;font-weight:700;letter-spacing:-1px;line-height:1}
.ks{font-size:11px;margin-top:4px}.ks.red{color:#f85149}.ks.green{color:#3fb950}.ks.muted{color:#8b949e}.ks.amber{color:#e3b341}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px}
.card.full{grid-column:1/-1}
.ct{font-size:12px;font-weight:600;margin-bottom:2px}.cs{font-size:11px;color:#8b949e;margin-bottom:10px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:#8b949e}
.ld{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.tbl-wrap{overflow-x:auto;max-height:420px;overflow-y:auto}
table{width:100%;border-collapse:collapse;min-width:750px}
th{padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:#8b949e;text-transform:uppercase;background:#21262d;border-bottom:1px solid #30363d;position:sticky;top:0;white-space:nowrap}
td{padding:7px 10px;font-size:11px;border-bottom:1px solid #21262d40}
tr:hover td{background:#21262d55}
.tfoot td{background:#21262d;font-weight:600;font-size:11px;position:sticky;bottom:0}
.pill{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;background:#388bfd22;color:#79c0ff}
.num{font-variant-numeric:tabular-nums}
.bw{display:flex;align-items:center;gap:5px}
.bb{flex:1;height:4px;background:#21262d;border-radius:2px;overflow:hidden;min-width:40px}
.bf{height:100%;border-radius:2px}
/* decomp styles inline */
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="logo">BTI <span>Analytics</span></div>
    <div class="sep"></div>
    <span class="badge">Cancellation Report</span>
    <span style="font-size:11px;color:#8b949e"><span class="dot"></span><span id="rcLbl">Loading data…</span></span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="btn btn-p" onclick="applyFilters()">↻ Apply</button>
    <button class="btn btn-g" onclick="resetFilters()">Reset</button>
  </div>
</div>

<div class="filters">
  <div class="fg"><span class="fl">Date From</span><input type="date" id="df" value="2022-01-01"></div>
  <div class="fg"><span class="fl">Date To</span><input type="date" id="dt" value="2026-04-20"></div>
  <div class="sep"></div>
  <div class="fg"><span class="fl">SKU</span><select id="fSku"><option value="">All SKUs</option></select></div>
  <div class="fg">
    <span class="fl">Partner Category</span>
    <select id="fPcat"><option value="">All Categories</option><option>Enrollment Mentor</option><option>Event</option><option>Marketing</option><option>Affiliate</option></select>
  </div>
  <div class="fg">
    <span class="fl">Referral Partner <span id="msCnt" class="ms-cnt" style="display:none"></span></span>
    <div class="ms-wrap" id="msWrap">
      <button class="ms-btn" id="msBtn" onclick="toggleMs(event)">All Partners</button>
      <div class="ms-drop" id="msDrop">
        <div class="ms-sticky">
          <div class="ms-search"><input type="text" id="msQ" placeholder="Search…" oninput="renderMsItems()"></div>
          <div class="ms-actions">
            <button class="ms-act" onclick="msAll()">Select all</button>
            <button class="ms-act" onclick="msClear()">Clear all</button>
          </div>
        </div>
        <div id="msItems"></div>
      </div>
    </div>
  </div>
  <div class="fg"><span class="fl">Active Status</span><select id="fAct"><option value="">All</option><option>Active</option><option>Inactive</option></select></div>
  <div class="fg"><span class="fl">CNCL Status</span><select id="fCncl"><option value="">All</option><option>Sale</option><option>Cancelled</option><option>Entry Error</option><option>Upgrade</option><option>Downgrade</option><option>Switch</option></select></div>
</div>

<div id="mainContent">
  <div class="loading"><div class="spinner"></div><div>Loading dashboard data…</div></div>
</div>

<script>
var D = null;
var Ti=0,Ci=1,Ei=2,Ui=3,Di=4,Ai=5,Ii=6,CRi=7;
var selP = new Set();
var charts = {};

function sumArr(arr){
  var o=[0,0,0,0,0,0,0,0];
  for(var i=0;i<arr.length;i++){var a=arr[i];if(a)for(var j=0;j<8;j++)o[j]+=(a[j]||0);}
  return o;
}

function toggleMs(e){
  e.stopPropagation();
  var dr=document.getElementById('msDrop');
  dr.classList.toggle('open');
  if(dr.classList.contains('open')){document.getElementById('msQ').focus();renderMsItems();}
}
document.addEventListener('click',function(e){
  if(!document.getElementById('msWrap').contains(e.target))
    document.getElementById('msDrop').classList.remove('open');
});

function renderMsItems(){
  if(!D)return;
  var q=document.getElementById('msQ').value.toLowerCase();
  var vis=D.FL.partners.filter(function(p){return p.toLowerCase().indexOf(q)>=0;});
  document.getElementById('msItems').innerHTML=vis.map(function(p){
    var checked=selP.has(p)?'checked':'';
    var escaped=p.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return '<div class="ms-item" data-p="'+escaped+'" onclick="togP(this)"><input type="checkbox" '+checked+' onclick="return false"><span>'+escaped+'</span></div>';
  }).join('');
}

function togP(el){
  var p=el.getAttribute('data-p');
  if(selP.has(p))selP.delete(p);else selP.add(p);
  updateMsBtn();renderMsItems();
}
function msAll(){
  var q=document.getElementById('msQ').value.toLowerCase();
  D.FL.partners.filter(function(p){return p.toLowerCase().indexOf(q)>=0;}).forEach(function(p){selP.add(p);});
  updateMsBtn();renderMsItems();
}
function msClear(){selP.clear();updateMsBtn();renderMsItems();}
function updateMsBtn(){
  var btn=document.getElementById('msBtn');
  var cnt=document.getElementById('msCnt');
  if(selP.size===0){btn.textContent='All Partners';cnt.style.display='none';}
  else{btn.textContent=selP.size===1?Array.from(selP)[0].slice(0,22):selP.size+' partners selected';cnt.textContent=selP.size;cnt.style.display='inline';}
}

function getRange(){return{df:document.getElementById('df').value.slice(0,7),dt:document.getElementById('dt').value.slice(0,7)};}

function getMonthlyBuckets(){
  var r=getRange();
  var pcat=document.getElementById('fPcat').value;
  if(selP.size>0){
    // Use partner monthly for date-aware totals
    var byMonth={};
    Array.from(selP).forEach(function(p){
      var pm=(D.PM&&D.PM[p])||{};
      Object.keys(pm).forEach(function(m){
        if(m<r.df||m>r.dt)return;
        if(!byMonth[m])byMonth[m]=[0,0,0,0,0,0,0,0];
        var v=pm[m];
        for(var i=0;i<8;i++)byMonth[m][i]+=(v[i]||0);
      });
    });
    return Object.values(byMonth);
  }else if(pcat){
    var pm=D.PCM[pcat]||{};
    return Object.keys(pm).filter(function(m){return m>=r.df&&m<=r.dt;}).map(function(m){return pm[m];});
  }else{
    return Object.keys(D.M).filter(function(m){return m>=r.df&&m<=r.dt;}).map(function(m){return D.M[m];});
  }
}

function getTimeSeries(){
  var r=getRange();
  var pcat=document.getElementById('fPcat').value;
  if(selP.size>0){
    // Merge monthly data for selected partners
    var byMonth={};
    Array.from(selP).forEach(function(p){
      var pm=(D.PM&&D.PM[p])||{};
      Object.keys(pm).forEach(function(m){
        if(m<r.df||m>r.dt)return;
        if(!byMonth[m])byMonth[m]=[0,0,0,0,0,0,0,0];
        var v=pm[m];
        for(var i=0;i<8;i++)byMonth[m][i]+=(v[i]||0);
      });
    });
    return Object.keys(byMonth).sort().map(function(m){return{m:m,b:byMonth[m]};});
  }else if(pcat){
    var pm=D.PCM[pcat]||{};
    return Object.keys(pm).filter(function(m){return m>=r.df&&m<=r.dt;}).sort().map(function(m){return{m:m,b:pm[m]};});
  }else{
    return Object.keys(D.M).filter(function(m){return m>=r.df&&m<=r.dt;}).sort().map(function(m){return{m:m,b:D.M[m]};});
  }
}

function destroyCharts(){Object.values(charts).forEach(function(c){try{c.destroy();}catch(e){}});charts={};}

function applyFilters(){document.getElementById('msDrop').classList.remove('open');render();}
function resetFilters(){
  document.getElementById('df').value='2022-01-01';
  document.getElementById('dt').value='2026-04-20';
  ['fSku','fPcat','fAct','fCncl'].forEach(function(id){document.getElementById(id).value='';});
  selP.clear();updateMsBtn();render();
}

function buildMainHTML(){
  return '<div class="main">'+
    '<div class="kpi-row" id="kpiRow"></div>'+
    '<div class="card full"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'+
    '<div><div class="ct">Cancel % rate by month</div><div class="cs" style="margin-bottom:0">Stacked by status · cancel rate line</div></div>'+
    '<div class="legend" style="margin-bottom:0">'+
    '<div class="li"><div class="ld" style="background:#f85149"></div>Cancelled</div>'+
    '<div class="li"><div class="ld" style="background:#e3b341"></div>Entry Error</div>'+
    '<div class="li"><div class="ld" style="background:#3fb950"></div>Upgrade</div>'+
    '<div class="li"><div class="ld" style="background:#bc8cff"></div>Downgrade</div>'+
    '<div class="li"><div class="ld" style="background:#388bfd;width:18px;height:2px;border-radius:0"></div>Cancel %</div>'+
    '</div></div><div style="height:260px;position:relative"><canvas id="trendChart"></canvas></div></div>'+
    '<div class="card full">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div><div class="ct">Decomposition tree</div><div class="cs" style="margin-bottom:0">Click any node to drill down · Breadcrumb to navigate back</div></div>
    </div>
    <div id="decompBreadcrumb" style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:10px;min-height:24px"></div>
    <div style="overflow-x:auto;padding-bottom:8px"><div id="decompTree" style="display:flex;align-items:flex-start;gap:0;min-width:max-content;padding:2px"></div></div>
  </div>'+
    '<div class="grid2">'+
    '<div class="card"><div class="ct">Cancel % by SKU</div><div class="cs">Top 15 · red &gt;30% · amber &gt;15%</div><div id="skuBarWrap" style="height:320px;position:relative"><canvas id="skuBarChart"></canvas></div></div>'+
    '<div class="card"><div class="ct">Volume by SKU</div><div class="cs">Cancelled · Entry Error · Upgrade · Downgrade</div><div id="skuGrpWrap" style="height:320px;position:relative"><canvas id="skuGrpChart"></canvas></div></div>'+
    '</div>'+
    '<div class="grid2">'+
    '<div class="card"><div class="ct">By partner category</div><div class="cs">Share of cancellations</div><div style="height:200px;position:relative"><canvas id="pcatChart"></canvas></div></div>'+
    '<div class="card"><div class="ct">Refund days</div><div class="cs">Days between order and refund</div><div style="height:200px;position:relative"><canvas id="rdChart"></canvas></div></div>'+
    '</div>'+
    '<div class="card full"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><div class="ct">SKU summary</div><div style="font-size:11px;color:#8b949e" id="tblInfo"></div></div>'+
    '<div class="tbl-wrap"><table>'+
    '<thead><tr><th>SKU</th><th>Total</th><th>Active</th><th>Inactive</th><th>Sale</th><th>Cancelled</th><th>Entry Error</th><th>Upgrade</th><th>Downgrade</th><th>Net Orders</th><th>Cancel %</th><th>Lost Revenue</th></tr></thead>'+
    '<tbody id="skuTbody"></tbody><tfoot><tr class="tfoot" id="skuTfoot"></tr></tfoot></table></div></div>'+
    '</div>';
}

function render(){
  destroyCharts();
  var buckets=getMonthlyBuckets();
  var tot=sumArr(buckets);
  var T=tot[Ti],C=tot[Ci],E=tot[Ei],U=tot[Ui],Dv=tot[Di],AC=tot[Ai],IN=tot[Ii],LR=tot[CRi];
  var valid=T-E;
  var rate=valid>0?(C/valid*100):0;
  var net=T-C-E;
  var pcat=document.getElementById('fPcat').value;

  document.getElementById('rcLbl').textContent=T.toLocaleString()+' records · '+(selP.size>0?selP.size+' partner(s)':pcat||'all data');

  document.getElementById('kpiRow').innerHTML=
    '<div class="kpi k1"><div class="kl">Total Units</div><div class="kv">'+T.toLocaleString()+'</div><div class="ks muted">PAYMENTS_TOTAL &gt; 0</div></div>'+
    '<div class="kpi k2"><div class="kl">Active</div><div class="kv" style="color:#58a6ff">'+AC.toLocaleString()+'</div><div class="ks muted">'+(T>0?(AC/T*100).toFixed(1):0)+'% of total</div></div>'+
    '<div class="kpi k3"><div class="kl">Inactive</div><div class="kv" style="color:#f85149">'+IN.toLocaleString()+'</div><div class="ks red">'+(T>0?(IN/T*100).toFixed(1):0)+'% of total</div></div>'+
    '<div class="kpi k4"><div class="kl">Cancelled</div><div class="kv" style="color:#f85149">'+C.toLocaleString()+'</div><div class="ks red">'+rate.toFixed(2)+'% cancel rate</div></div>'+
    '<div class="kpi k5"><div class="kl">Entry Error</div><div class="kv" style="color:#e3b341">'+E.toLocaleString()+'</div><div class="ks amber">excl. from cancel %</div></div>'+
    '<div class="kpi k6"><div class="kl">Upgrades</div><div class="kv" style="color:#3fb950">'+U.toLocaleString()+'</div><div class="ks green">upgrade events</div></div>'+
    '<div class="kpi k7"><div class="kl">Downgrades</div><div class="kv" style="color:#bc8cff">'+Dv.toLocaleString()+'</div><div class="ks muted">downgrade events</div></div>'+
    '<div class="kpi k8"><div class="kl">Lost Revenue</div><div class="kv" style="color:#39d353">$'+Math.round(LR).toLocaleString()+'</div><div class="ks red">payments on cancels</div></div>';

  var ts=getTimeSeries();
  var mLabels=ts.map(function(x){if(x.m==='Selected')return x.m;var p=x.m.split('-');return new Date(p[0],p[1]-1).toLocaleString('default',{month:'short',year:'2-digit'});});

  charts.trend=new Chart(document.getElementById('trendChart'),{
    type:'bar',
    data:{labels:mLabels,datasets:[
      {label:'Cancelled',data:ts.map(function(x){return x.b[Ci];}),backgroundColor:'rgba(248,81,73,0.8)',borderRadius:3,stack:'s'},
      {label:'Entry Error',data:ts.map(function(x){return x.b[Ei];}),backgroundColor:'rgba(227,179,65,0.8)',borderRadius:3,stack:'s'},
      {label:'Upgrade',data:ts.map(function(x){return x.b[Ui];}),backgroundColor:'rgba(63,185,80,0.8)',borderRadius:3,stack:'s'},
      {label:'Downgrade',data:ts.map(function(x){return x.b[Di];}),backgroundColor:'rgba(188,140,255,0.8)',borderRadius:3,stack:'s'},
      {label:'Cancel %',data:ts.map(function(x){var v=x.b[Ti]-x.b[Ei];return v>0?+(x.b[Ci]/v*100).toFixed(2):0;}),
        type:'line',yAxisID:'y2',borderColor:'#388bfd',backgroundColor:'rgba(56,139,253,0.07)',fill:true,tension:0.35,pointRadius:2,pointBackgroundColor:'#388bfd',borderWidth:2}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
      scales:{
        x:{stacked:true,ticks:{color:'#8b949e',font:{size:10},maxRotation:45,autoSkip:true,maxTicksLimit:24},grid:{color:'#21262d44'}},
        y:{stacked:true,ticks:{color:'#8b949e',font:{size:10}},grid:{color:'#21262d44'}},
        y2:{position:'right',ticks:{color:'#388bfd',font:{size:10},callback:function(v){return v+'%';}},grid:{display:false}}
      }}
  });

  treePath=[];buildDecompTree({pcat:document.getElementById("fPcat").value});

  var skuArr=Object.keys(D.S).map(function(sku){
    var v=D.S[sku];
    return{sku:sku,T:v[Ti],C:v[Ci],E:v[Ei],U:v[Ui],D:v[Di],AC:v[Ai],IN:v[Ii],LR:v[CRi],sale:v[Ti]-v[Ci]-v[Ei]-v[Ui]-v[Di],rate:v[Ti]>0?((v[Ci]+v[Ei])/v[Ti]*100):0};
  }).sort(function(a,b){return b.C-a.C;});
  var top15=skuArr.slice(0,15);
  var bh=Math.max(320,top15.length*38);
  document.getElementById('skuBarWrap').style.height=bh+'px';
  document.getElementById('skuGrpWrap').style.height=bh+'px';

  charts.skuBar=new Chart(document.getElementById('skuBarChart'),{type:'bar',
    data:{labels:top15.map(function(s){return s.sku;}),datasets:[{data:top15.map(function(s){return +s.rate.toFixed(1);}),
      backgroundColor:top15.map(function(s){return s.rate>30?'rgba(248,81,73,0.85)':s.rate>15?'rgba(227,179,65,0.85)':'rgba(56,139,253,0.85)';}),borderRadius:4}]},

var treePath = [];

function getTreeData(filters) {
  var pcat = filters && filters.pcat;
  var src = (pcat && TREE.pcat[pcat]) ? TREE.pcat[pcat] : TREE;
  return {
    total: src.total || TREE.total,
    active: src.active || TREE.active,
    inactive: src.inactive || TREE.inactive,
    cancelled: src.cancelled || TREE.cancelled,
    entry_error: src.entry_error || TREE.entry_error,
    upgrade: TREE.upgrade,
    downgrade: TREE.downgrade,
    sale: TREE.sale,
    monthly: src.monthly || TREE.monthly,
    refund_month: TREE.refund_month,
    refund_days: TREE.refund_days
  };
}

function buildDecompTree(filters) {
  var td = getTreeData(filters);
  var total = td.total;
  
  // Define all levels
  var levels = [
    {
      title: 'Total Units',
      items: [{ label:'Total Units', value:total, color:'#388bfd', pct:100, nextLevel:1 }]
    },
    {
      title: 'Active Status',
      items: [
        { label:'Active',   value:td.active,   color:'#58a6ff', pct:total>0?(td.active/total*100).toFixed(1):0,   nextLevel:2 },
        { label:'Inactive', value:td.inactive, color:'#f85149', pct:total>0?(td.inactive/total*100).toFixed(1):0, nextLevel:2 }
      ]
    },
    {
      title: 'Month Year',
      items: td.monthly.map(function(m){
        return { label:m.label, value:m.value, color:'#388bfd', pct:total>0?(m.value/total*100).toFixed(1):0, nextLevel:3 };
      })
    },
    {
      title: 'Refund Month',
      items: td.refund_month.slice(0,10).map(function(m){
        var rmTotal = td.refund_month.reduce(function(s,x){return s+x.value;},0)||1;
        return { label:m.label, value:m.value, color:'#f85149', pct:(m.value/rmTotal*100).toFixed(1), nextLevel:4 };
      })
    },
    {
      title: 'CNCL Status',
      items: [
        { label:'Cancelled',   value:td.cancelled,   color:'#f85149', pct:total>0?(td.cancelled/total*100).toFixed(1):0,   nextLevel:5 },
        { label:'Entry Error', value:td.entry_error, color:'#e3b341', pct:total>0?(td.entry_error/total*100).toFixed(1):0, nextLevel:5 },
        { label:'Upgrade',     value:td.upgrade,     color:'#3fb950', pct:total>0?(td.upgrade/total*100).toFixed(1):0,     nextLevel:5 },
        { label:'Downgrade',   value:td.downgrade,   color:'#bc8cff', pct:total>0?(td.downgrade/total*100).toFixed(1):0   },
        { label:'Sale',        value:td.sale,        color:'#39d353', pct:total>0?(td.sale/total*100).toFixed(1):0         }
      ].filter(function(x){return x.value>0;})
    },
    {
      title: 'Refund Days',
      items: td.refund_days.map(function(m){
        var rdTotal = td.refund_days.reduce(function(s,x){return s+x.value;},0)||1;
        return { label:m.label, value:m.value, color:'#388bfd', pct:(m.value/rdTotal*100).toFixed(1) };
      })
    }
  ];

  renderDecompTree(levels, total);
  buildDecompBreadcrumb(levels);
}

function renderDecompTree(levels, grandTotal) {
  var tree = document.getElementById('decompTree');
  tree.innerHTML = '';

  // Show levels up to current path depth + 1 next level
  var showUpTo = Math.min(treePath.length + 1, levels.length - 1);

  for (var li = 0; li <= showUpTo; li++) {
    var level = levels[li];
    if (!level) break;

    // Connector line between levels
    if (li > 0) {
      var conn = document.createElement('div');
      conn.style.cssText = 'width:28px;height:auto;align-self:stretch;display:flex;align-items:center;flex-shrink:0;position:relative';
      conn.innerHTML = '<div style="width:100%;height:1px;background:'+(treePath.length>=li?'#388bfd':'#30363d')+'"></div>';
      tree.appendChild(conn);
    }

    var col = document.createElement('div');
    col.style.cssText = 'display:flex;flex-direction:column;align-items:stretch;flex-shrink:0;width:165px';

    // Header
    var hdr = document.createElement('div');
    hdr.style.cssText = 'font-size:10px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.7px;text-align:center;padding:5px 10px 8px;border-bottom:1px solid #30363d;margin-bottom:6px';
    hdr.textContent = level.title;
    col.appendChild(hdr);

    // Items
    var itemsWrap = document.createElement('div');
    itemsWrap.style.cssText = 'display:flex;flex-direction:column;gap:5px;max-height:380px;overflow-y:auto;padding-right:2px';

    var selectedIdx = (li > 0 && treePath[li-1] !== undefined) ? treePath[li-1] : -1;
    var maxVal = Math.max.apply(null, level.items.map(function(x){return x.value;}).concat([1]));
    var isClickable = li === showUpTo && li < levels.length - 1;

    level.items.forEach(function(item, idx) {
      var node = document.createElement('div');
      var isSelected = selectedIdx === idx;
      var isDimmed = selectedIdx >= 0 && !isSelected;
      var canClick = isClickable && item.nextLevel !== undefined;

      node.style.cssText = 'background:'+(isSelected?'#1c2128':'#161b22')+';border:1px solid '+(isSelected?'#388bfd':'#30363d')+
        ';border-radius:7px;padding:9px 11px;transition:all .15s;opacity:'+(isDimmed?'0.35':'1')+
        ';cursor:'+(canClick?'pointer':'default')+';position:relative';

      var barW = (item.value/maxVal*100).toFixed(0);

      node.innerHTML = 
        '<div style="font-size:10px;color:#8b949e;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+item.label+'</div>'+
        '<div style="font-size:20px;font-weight:700;letter-spacing:-0.5px;line-height:1;color:'+item.color+';margin-bottom:5px">'+Number(item.value).toLocaleString()+'</div>'+
        '<div style="height:3px;background:#21262d;border-radius:2px;overflow:hidden;margin-bottom:4px">'+
          '<div style="height:100%;width:'+barW+'%;background:'+item.color+';border-radius:2px;transition:width .3s"></div>'+
        '</div>'+
        '<div style="font-size:10px;font-weight:500;color:'+item.color+'">'+item.pct+'% of total</div>'+
        (canClick?'<div style="font-size:9px;color:#388bfd;margin-top:3px">Click to drill down →</div>':'');

      if (canClick) {
        (function(capturedIdx, capturedLi, capturedItem) {
          node.onclick = function() {
            treePath = treePath.slice(0, capturedLi - 1);
            treePath.push(capturedIdx);
            renderDecompTree(levels, grandTotal);
            buildDecompBreadcrumb(levels);
          };
          node.onmouseenter = function() {
            if (!node.classList.contains('selected'))
              node.style.borderColor = '#388bfd88';
          };
          node.onmouseleave = function() {
            if (!isSelected) node.style.borderColor = '#30363d';
          };
        })(idx, li, item);
      }

      itemsWrap.appendChild(node);
    });

    col.appendChild(itemsWrap);
    tree.appendChild(col);
  }
}

function buildDecompBreadcrumb(levels) {
  var bc = document.getElementById('decompBreadcrumb');
  if (!bc) return;
  bc.innerHTML = '';

  function addCrumb(text, onClick, isActive) {
    var span = document.createElement('span');
    span.style.cssText = 'font-size:11px;color:'+(isActive?'#388bfd':'#8b949e')+';cursor:pointer;padding:2px 6px;border-radius:4px;font-weight:'+(isActive?'600':'400');
    span.textContent = text;
    if (onClick) {
      span.onclick = onClick;
      span.onmouseenter = function(){span.style.background='#21262d';span.style.color='#e6edf3';};
      span.onmouseleave = function(){span.style.background='';span.style.color=isActive?'#388bfd':'#8b949e';};
    }
    bc.appendChild(span);
  }

  function addSep() {
    var sep = document.createElement('span');
    sep.style.cssText = 'color:#30363d;font-size:12px;padding:0 2px';
    sep.textContent = '›';
    bc.appendChild(sep);
  }

  addCrumb('Total Units', function() { treePath=[]; renderDecompTree(levels, levels[0].items[0].value); buildDecompBreadcrumb(levels); }, treePath.length===0);
  
  treePath.forEach(function(selIdx, i) {
    addSep();
    var levelItems = levels[i+1] ? levels[i+1].items : [];
    var item = levelItems[selIdx];
    if (item) {
      (function(capturedI) {
        addCrumb(item.label, function() {
          treePath = treePath.slice(0, capturedI + 1);
          renderDecompTree(levels, levels[0].items[0].value);
          buildDecompBreadcrumb(levels);
        }, i === treePath.length-1);
      })(i);
    }
  });

  if (treePath.length > 0) {
    var sep = document.createElement('span');
    sep.style.cssText='color:#30363d;padding:0 4px';sep.textContent='|';
    bc.appendChild(sep);
    var reset = document.createElement('span');
    reset.style.cssText='font-size:11px;color:#f85149;cursor:pointer;padding:2px 8px;border-radius:4px;border:1px solid #f8514933;background:#f8514911';
    reset.textContent='✕ Reset';
    reset.onclick = function(){treePath=[];renderDecompTree(levels,levels[0].items[0].value);buildDecompBreadcrumb(levels);};
    bc.appendChild(reset);
  }
}
